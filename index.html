<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subvencions GVA</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1f2d45;
            --accent: #f97316;
            --accent2: #3b82f6;
            --text: #f1f5f9;
            --muted: #64748b;
            --gold: #fbbf24;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header {
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex; align-items: center; gap: 16px;
            background: linear-gradient(180deg, #0f1629 0%, transparent 100%);
        }
        .header-logo {
            width: 36px; height: 36px; background: var(--accent);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .header-sub { font-size: 13px; color: var(--muted); margin-left: auto; }
        .live-dot {
            display: inline-block; width: 8px; height: 8px; background: #22c55e;
            border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }

        .loading-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; gap: 20px;
        }
        .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .loading-year { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; color: var(--border); letter-spacing: -4px; }
        .loading-text { color: var(--muted); font-size: 14px; }

        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .kpi-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 28px; position: relative; overflow: hidden; transition: border-color 0.2s;
        }
        .kpi-card:hover { border-color: var(--accent); }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
        .kpi-card.orange::before { background: var(--accent); }
        .kpi-card.blue::before { background: var(--accent2); }
        .kpi-card.gold::before { background: var(--gold); }
        .kpi-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
        .kpi-value { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; line-height: 1; letter-spacing: -2px; margin-bottom: 8px; }
        .kpi-card.orange .kpi-value { color: var(--accent); }
        .kpi-card.blue .kpi-value { color: var(--accent2); }
        .kpi-card.gold .kpi-value { color: var(--gold); }
        .kpi-sub { font-size: 12px; color: var(--muted); }
        .kpi-icon { position: absolute; right: 24px; top: 24px; font-size: 32px; opacity: 0.12; }

        .bottom-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 16px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
        .panel-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 24px; }
        .panel-title span { color: var(--accent); }
        .chart-wrap { position: relative; height: 280px; }

        .rank-list { display: flex; flex-direction: column; gap: 8px; }
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--surface2); border-radius: 10px; transition: background 0.15s; }
        .rank-item:hover { background: var(--border); }
        .rank-num { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; width: 20px; text-align: center; flex-shrink: 0; color: var(--muted); }
        .rank-num.gold { color: var(--gold); }
        .rank-name { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-bar-wrap { width: 60px; height: 3px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
        .rank-bar { height: 100%; background: var(--accent); border-radius: 2px; }
        .rank-amount { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--accent); width: 65px; text-align: right; flex-shrink: 0; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead tr { border-bottom: 1px solid var(--border); }
        th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
        th.right, td.right { text-align: right; }
        td { padding: 11px 14px; border-bottom: 1px solid #0f1525; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }
        .td-name { font-weight: 500; }
        .td-prog { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; background: rgba(59,130,246,0.12); color: var(--accent2); white-space: nowrap; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
        .amount { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); }
        .year-tag { color: var(--muted); font-size: 12px; }
        .footer { text-align: center; padding: 32px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 16px; }

        @media (max-width: 900px) {
            .kpi-grid, .bottom-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            .header { padding: 16px 20px; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const PROXY = 'https://spring-sound-0eeb.hector-gie.workers.dev';

function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2) + 'B€';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M€';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'K€';
    return n.toFixed(0) + '€';
}

function BarChart({ data }) {
    const ref = useRef(null);
    const chart = useRef(null);
    useEffect(() => {
        if (!ref.current || !data.length) return;
        if (chart.current) chart.current.destroy();
        chart.current = new Chart(ref.current.getContext('2d'), {
            type: 'bar',
            data: {
                labels: data.map(d => d.year),
                datasets: [{ data: data.map(d => d.total),
                    backgroundColor: data.map((d, i) => i === data.length-1 ? '#f97316' : '#1f2d45'),
                    hoverBackgroundColor: '#f97316', borderRadius: 6, borderSkipped: false }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: '#1a2235', borderColor: '#1f2d45', borderWidth: 1,
                        titleColor: '#f1f5f9', bodyColor: '#f97316',
                        callbacks: { label: c => ' ' + fmt(c.raw) } }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#64748b' }, border: { display: false } },
                    y: { grid: { color: '#1f2d45' }, ticks: { color: '#64748b', callback: v => fmt(v) }, border: { display: false } }
                }
            }
        });
        return () => chart.current?.destroy();
    }, [data]);
    return <div className="chart-wrap"><canvas ref={ref} /></div>;
}

function App() {
    const [loading, setLoading] = useState(true);
    const [loadingYear, setLoadingYear] = useState('');
    const [records, setRecords] = useState([]);
    const [error, setError] = useState(null);
    const [search, setSearch] = useState('');

    useEffect(() => { loadData(); }, []);

    const loadData = async () => {
        try {
            const currentYear = new Date().getFullYear();
            
            // IDs dels datasets coneguts (basats en el patró eco-gvo-subv-XXXX)
            const datasetIds = [
                'eco-gvo-subv-2022',
                'eco-gvo-subv-2023',
                'eco-gvo-subv-2024',
                'eco-gvo-subv-2025',
            ];
            
            let all = [];

            // Funció per carregar TOTS els registres d'un recurs via API datastore
            const loadAllRecordsFromDatastore = async (resourceId, datasetTitle, year) => {
                const PAGE = 5000;
                let offset = 0;
                let total = null;
                let records = [];
                while (true) {
                    const url = `${PROXY}?action=datastore_search&resource_id=${resourceId}&limit=${PAGE}&offset=${offset}`;
                    const r = await fetch(url);
                    if (!r.ok) break;
                    const d = await r.json();
                    if (!d.success) break;
                    const batch = d.result?.records || [];
                    if (total === null) total = d.result?.total || 0;
                    records = [...records, ...batch];
                    offset += PAGE;
                    if (batch.length < PAGE || offset >= total) break;
                }
                return records.map((r, i) => ({
                    id: `${resourceId}_${i}`,
                    nom: r['nombre'] || r['beneficiario'] || '—',
                    import: parseFloat(r['importe'] || 0) || 0,
                    any: parseInt(r['cd_ejercicio'] || year),
                    fecha: r['fecha_concesion'] || null,
                    tipus: r['ds_finalidad_v'] || r['ds_finalidad_c'] || '',
                    programa: r['convocatoria'] || datasetTitle,
                    provincia: r['ds_provincia'] || '',
                }));
            };

            // Funció per carregar registres d'un CSV directament
            const loadAllRecordsFromCSV = async (csvUrl, datasetTitle, year) => {
                try {
                    const r = await fetch(csvUrl);
                    if (!r.ok) return [];
                    const text = await r.text();
                    const lines = text.trim().split('\n');
                    if (lines.length < 2) return [];
                    
                    // Detectar separador (coma o punt i coma)
                    const headerLine = lines[0];
                    const sep = headerLine.includes(';') ? ';' : ',';
                    const headers = headerLine.split(sep).map(h => h.trim().toLowerCase());
                    
                    const records = [];
                    for (let i = 1; i < lines.length; i++) {
                        const parts = lines[i].split(sep);
                        if (parts.length !== headers.length) continue;
                        
                        const row = {};
                        headers.forEach((h, idx) => {
                            row[h] = parts[idx]?.trim() || '';
                        });
                        
                        // Mappejar els camps comuns
                        const nom = row['nombre'] || row['beneficiario'] || row['nom'] || '—';
                        const importStr = row['importe'] || row['import'] || '0';
                        const anyStr = row['cd_ejercicio'] || row['any'] || String(year);
                        const importNum = parseFloat(importStr.replace(',', '.')) || 0;
                        
                        if (nom !== '—' && importNum > 0) {
                            records.push({
                                id: `csv_${year}_${i}`,
                                nom: nom,
                                import: importNum,
                                any: parseInt(anyStr) || year,
                                fecha: row['fecha_concesion'] || row['fecha'] || null,
                                tipus: row['ds_finalidad_v'] || row['ds_finalidad_c'] || row['tipus'] || '',
                                programa: row['convocatoria'] || datasetTitle,
                                provincia: row['ds_provincia'] || row['provincia'] || '',
                            });
                        }
                    }
                    return records;
                } catch(e) {
                    console.warn('Error carregant CSV:', csvUrl, e);
                    return [];
                }
            };

            for (const datasetId of datasetIds) {
                const year = parseInt(datasetId.split('-').pop());
                setLoadingYear(String(year));
                try {
                    // Obtenir info del dataset per ID
                    const res = await fetch(`${PROXY}?action=package_show&id=${datasetId}`);
                    const data = await res.json();
                    
                    if (!data.success) {
                        console.log(`Dataset ${datasetId} no trobat`);
                        continue;
                    }
                    
                    const dataset = data.result;
                    console.log(`Any ${year}: ${dataset.title} amb ${dataset.resources.length} recursos`);

                    for (const resource of dataset.resources) {
                        if (resource.format?.toLowerCase() !== 'csv') continue;
                        
                        console.log(`  Carregant: ${resource.name} (datastore_active: ${resource.datastore_active})`);
                        let records = [];
                        
                        if (resource.datastore_active) {
                            // Usar API datastore si està actiu
                            records = await loadAllRecordsFromDatastore(resource.id, dataset.title, year);
                        } else if (resource.url) {
                            // Sinó, descarregar el CSV directament
                            records = await loadAllRecordsFromCSV(resource.url, dataset.title, year);
                        }
                        
                        if (records.length > 0) {
                            console.log(`  → ${records.length} registres`);
                            all = [...all, ...records];
                            setLoadingYear(`${year} (${all.length.toLocaleString()} registres)`);
                        }
                    }
                } catch(e) { 
                    console.warn('Error any', year, e); 
                }
            }

            console.log('TOTAL FINAL:', all.length);
            setRecords(all);
            setLoading(false);
        } catch(err) {
            setError(err.message);
            setLoading(false);
        }
    };

    const stats = useMemo(() => {
        if (!records.length) return null;
        const totalHistoric = records.reduce((s, r) => s + r.import, 0);

        const byYear = {};
        records.forEach(r => { byYear[r.any] = (byYear[r.any] || 0) + r.import; });
        const currentYear = new Date().getFullYear();
        const chartData = Array.from({ length: 8 }, (_, i) => currentYear - 7 + i)
            .map(y => ({ year: y, total: byYear[y] || 0 }))
            .filter(d => d.total > 0);

        const bestYear = chartData.reduce((b, d) => d.total > b.total ? d : b, chartData[0]);

        const byBenef = {};
        records.forEach(r => {
            const k = r.nom.trim().toUpperCase();
            if (!byBenef[k]) byBenef[k] = { nom: r.nom, total: 0 };
            byBenef[k].total += r.import;
        });
        const top10 = Object.values(byBenef).sort((a, b) => b.total - a.total).slice(0, 10);

        const recents = [...records]
            .sort((a, b) => a.fecha && b.fecha ? new Date(b.fecha) - new Date(a.fecha) : b.any - a.any)
            .slice(0, 20);

        return { totalHistoric, totalCount: records.length, chartData, top10, maxTop: top10[0]?.total || 1, recents };
    }, [records]);

    const searchResults = useMemo(() => {
        if (!search.trim() || search.length < 2) return [];
        const q = search.trim().toLowerCase();
        return records
            .filter(r => r.nom.toLowerCase().includes(q))
            .sort((a, b) => b.import - a.import)
            .slice(0, 50);
    }, [search, records]);

    if (loading) return (
        <div className="loading-screen">
            <div className="loading-year">{loadingYear || '...'}</div>
            <div className="spinner" />
            <div className="loading-text">Carregant dades de {loadingYear}…</div>
        </div>
    );
    if (error) return <div className="loading-screen" style={{color:'#ef4444'}}>{error}</div>;
    if (!stats) return null;

    return (
        <>
        <div className="header">
            <div className="header-logo">📊</div>
            <h1>Subvencions GVA</h1>
            <div className="header-sub"><span className="live-dot"/>Dades en viu · dadesobertes.gva.es</div>
        </div>
        <div className="container">

            {/* Cercador */}
            <div style={{marginBottom: 24}}>
                <div style={{position:'relative', maxWidth: 480}}>
                    <span style={{position:'absolute', left:16, top:'50%', transform:'translateY(-50%)', fontSize:16, pointerEvents:'none'}}>🔍</span>
                    <input
                        type="text"
                        placeholder="Cerca per beneficiari..."
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                        style={{
                            width:'100%', padding:'12px 16px 12px 44px',
                            background:'#111827', border:'1px solid #1f2d45',
                            borderRadius:12, color:'#f1f5f9', fontSize:14,
                            fontFamily:'DM Sans, sans-serif', outline:'none',
                            transition:'border-color 0.2s'
                        }}
                        onFocus={e => e.target.style.borderColor='#f97316'}
                        onBlur={e => e.target.style.borderColor='#1f2d45'}
                    />
                    {search && <button onClick={() => setSearch('')} style={{
                        position:'absolute', right:14, top:'50%', transform:'translateY(-50%)',
                        background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:18, lineHeight:1
                    }}>×</button>}
                </div>
            </div>

            {/* Resultats de cerca */}
            {search.length >= 2 && (
                <div className="panel" style={{marginBottom: 24}}>
                    <div className="panel-title">🔍 <span>Resultats</span> per "{search}" ({searchResults.length}{searchResults.length === 50 ? '+' : ''})</div>
                    {searchResults.length === 0 ? (
                        <div style={{color:'#64748b', fontSize:14, textAlign:'center', padding:'32px 0'}}>Cap resultat trobat</div>
                    ) : (
                        <div style={{overflowX:'auto'}}>
                            <table>
                                <thead><tr>
                                    <th>Beneficiari</th>
                                    <th>Programa</th>
                                    <th>Tipus</th>
                                    <th className="right">Import</th>
                                    <th className="right">Any</th>
                                </tr></thead>
                                <tbody>
                                    {searchResults.map(r => (
                                        <tr key={r.id}>
                                            <td><div className="td-name">{r.nom}</div></td>
                                            <td><div className="td-prog" title={r.programa}>{r.programa?.substring(0,55)}{r.programa?.length>55?'…':''}</div></td>
                                            <td><span className="badge">{r.tipus?.substring(0,22)||'—'}</span></td>
                                            <td className="right"><span className="amount">{fmt(r.import)}</span></td>
                                            <td className="right year-tag">{r.any}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            )}

            <div className="kpi-grid">
                <div className="kpi-card orange">
                    <div className="kpi-icon">💰</div>
                    <div className="kpi-label">Total històric concedit</div>
                    <div className="kpi-value">{fmt(stats.totalHistoric)}</div>
                    <div className="kpi-sub">{stats.totalCount.toLocaleString('ca-ES')} subvencions registrades</div>
                </div>
                <div className="kpi-card blue">
                    <div className="kpi-icon">📅</div>
                    <div className="kpi-label">Anys de dades disponibles</div>
                    <div className="kpi-value">{stats.chartData.length}</div>
                    <div className="kpi-sub">De {stats.chartData[0]?.year} a {stats.chartData[stats.chartData.length-1]?.year}</div>
                </div>
                <div className="kpi-card gold">
                    <div className="kpi-icon">🏆</div>
                    <div className="kpi-label">Major beneficiari històric</div>
                    <div className="kpi-value" style={{fontSize: stats.top10[0]?.nom.length > 14 ? '20px' : '26px', letterSpacing:'-0.5px', lineHeight:'1.2'}}>
                        {stats.top10[0]?.nom.substring(0,35)}{stats.top10[0]?.nom.length > 35 ? '…' : ''}
                    </div>
                    <div className="kpi-sub">{fmt(stats.top10[0]?.total || 0)} acumulats</div>
                </div>
            </div>

            <div className="bottom-grid">
                <div className="panel">
                    <div className="panel-title">📈 <span>Volum</span> per any (últims 8 anys)</div>
                    <BarChart data={stats.chartData} />
                </div>
                <div className="panel">
                    <div className="panel-title">🏅 <span>Top 10</span> beneficiaris històrics</div>
                    <div className="rank-list">
                        {stats.top10.map((b, i) => (
                            <div className="rank-item" key={i}>
                                <div className={`rank-num ${i < 3 ? 'gold' : ''}`}>{i+1}</div>
                                <div className="rank-name" title={b.nom}>{b.nom}</div>
                                <div className="rank-bar-wrap"><div className="rank-bar" style={{width:`${(b.total/stats.maxTop)*100}%`}}/></div>
                                <div className="rank-amount">{fmt(b.total)}</div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>

            <div className="panel">
                <div className="panel-title">🕐 <span>Subvencions</span> més recents</div>
                <div style={{overflowX:'auto'}}>
                    <table>
                        <thead><tr>
                            <th>Beneficiari</th>
                            <th>Programa</th>
                            <th>Tipus</th>
                            <th className="right">Import</th>
                            <th className="right">Data</th>
                        </tr></thead>
                        <tbody>
                            {stats.recents.map(r => (
                                <tr key={r.id}>
                                    <td><div className="td-name">{r.nom}</div></td>
                                    <td><div className="td-prog" title={r.programa}>{r.programa?.substring(0,55)}{r.programa?.length>55?'…':''}</div></td>
                                    <td><span className="badge" title={r.tipus}>{r.tipus?.substring(0,22)||'—'}</span></td>
                                    <td className="right"><span className="amount">{fmt(r.import)}</span></td>
                                    <td className="right year-tag">{r.fecha ? new Date(r.fecha).toLocaleDateString('ca-ES') : r.any}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
        <div className="footer">Dades en viu de dadesobertes.gva.es · Generalitat Valenciana</div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
